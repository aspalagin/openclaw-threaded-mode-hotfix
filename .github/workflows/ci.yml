name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm run check:syntax
      - run: npm install --ignore-scripts --no-save --prefix "$RUNNER_TEMP/openclaw-2026.6.11" openclaw@2026.6.11
      - run: |
          package_root="$RUNNER_TEMP/openclaw-2026.6.11/node_modules/openclaw"
          before=$(find "$package_root/dist" -type f -name '*.js' -print0 | sort -z | xargs -0 sha256sum | sha256sum)
          set +e
          OPENCLAW_PACKAGE_ROOT="$package_root" npm run dry-run:6.11
          status=$?
          set -e
          after=$(find "$package_root/dist" -type f -name '*.js' -print0 | sort -z | xargs -0 sha256sum | sha256sum)
          test "$before" = "$after"
          test "$status" -ne 0
